<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riemann Sums · Area Converges to the Integral</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../engine/chrome.css">
<style>
  /* Riemann-specific: canvas and the rectangle-count header. */
  :root{
    --graph-min:440px;
    --graph-min-sm:340px;
    --readout-max:430px;
    --fbtn-cols:3;
    --toggle-cols:3;
    --thumb:20px;
    --thumb-moz:18px;
  }
  #graph{display:block;width:100%;height:100%}
  .readout .er{color:var(--error)}
  .n-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .n-head .n{font-family:"Fraunces",serif;font-weight:900;font-size:30px;color:var(--approx);line-height:1}
  .n-head .n small{font-family:"JetBrains Mono";font-size:12px;color:var(--muted);font-weight:400;letter-spacing:.06em}
  .tbtn{font-family:inherit;font-size:13px;letter-spacing:.04em}
</style>
</head>
<body>
<canvas id="fx"></canvas>
<div class="toast-wrap" id="toasts"></div>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="kicker">Math · Visual Studio</div>
      <h1>Riemann <em>Sums</em></h1>
    </div>
    <div class="scoreboard">
      <div class="chip pts"><div class="lab">Points</div><div class="val" id="s-pts">0</div></div>
      <div class="chip streak"><div class="lab">Streak</div><div class="val" id="s-streak">0</div></div>
      <div class="chip"><div class="lab">Badges</div><div class="val" id="s-badges">0</div></div>
    </div>
  </header>
  <div class="studio">
    <div class="card graph-card">
      <canvas id="graph" role="img" aria-label="Riemann sum graph. Arrow keys and plus and minus add or remove rectangles." aria-describedby="readout"></canvas>
      <div class="graph-tag">add rectangles ⟶ the sum climbs toward the true area</div>
      <div class="legend">
        <span><i class="swatch" style="background:var(--true)"></i> f(x)</span>
        <span><i class="swatch" style="background:var(--approx)"></i> rectangles</span>
      </div>
      <div class="readout" id="readout" role="status" aria-live="polite"></div>
    </div>
    <div class="card panel">
      <div>
        <div class="sect-lab">Integrand</div>
        <div class="fbtns" id="fbtns"></div>
      </div>
      <div>
        <div class="sect-lab">Sampling rule</div>
        <div class="toggle" id="rules"></div>
      </div>
      <div>
        <div class="n-head">
          <div class="sect-lab" style="margin:0">Rectangles</div>
          <div class="n" id="n-lab">4<small> rect</small></div>
        </div>
        <input type="range" class="mint" id="n" min="1" max="80" value="4" step="1" aria-label="Number of rectangles">
        <div class="row" style="margin-top:12px">
          <button class="action primary" id="refine">▸ Refine n → ∞</button>
          <button class="action" id="reset">Reset</button>
          <button class="action" id="copylink">Copy link</button>
        </div>
      </div>
      <div class="challenge">
        <div class="lab">◆ Convergence challenge</div>
        <div class="goal" id="c-goal"></div>
        <div class="cmeter"><span>error <b id="c-val">—</b></span><span>target <b id="c-tol">—</b></span></div>
        <div class="cbar"><i id="c-bar"></i></div>
        <div class="cstate" id="c-state">Add rectangles — the sum is still off the true area.</div>
      </div>
    </div>
  </div>
</div>
<script type="module" src="./playground.js"></script>
</body>
</html>
